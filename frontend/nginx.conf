server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # nginx compress (level 6) to reduce bandwidth and improve load times
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/javascript image/svg+xml;
    gzip_min_length 1000;
    gzip_comp_level 6;

    # Security headers to enhance protection against common web vulnerabilities
    add_header X-Frame-Options        "SAMEORIGIN"                       always;
    add_header X-Content-Type-Options "nosniff"                          always;
    add_header X-XSS-Protection       "1; mode=block"                    always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin"  always;

    # test route for API calls (proxy to backend)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # assets cached for 1 year (immutable) to leverage browser caching and improve performance
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # no caching for HTML files to ensure users always get the latest version of the app
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
