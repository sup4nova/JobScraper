name: CI

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Backend: lint + syntax check ─────────────────────────────────
  backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Install ruff
        run: pip install ruff

      - name: Lint (ruff)
        run: ruff check backend/

      - name: Syntax check
        run: python -m compileall -q backend/

  # ── Backend: unit + API tests ───────────────────────────────────
  pytest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev requirements
        run: pip install -r backend/requirements-dev.txt

      - name: Run pytest
        run: pytest backend/tests/ -v

  # ── Frontend: syntax check ─────────────────────────────────────────
  # No build step by design - Vue is loaded from CDN directly in index.html
  # (see frontend/Dockerfile), so there's nothing to bundle.
  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Syntax check
        run: for f in frontend/public/*.js; do node --check "$f" || exit 1; done

  # ── Docker: checks that the images build ─────────────────────────
  docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose build
