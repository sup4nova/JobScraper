name: Deploy JobScraper bot

on:
  push:
    branches: [feature/bot-standalone-vps]   # ou main après merge
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-bot.yml'
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/jobscrapper-bot

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile.bot        # ⚠️ Dockerfile spécifique bot
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE }}:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: '0'

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GHCR_PAT,GHCR_USER,DISCORD_TOKEN,DISCORD_CHANNEL_ID,JOB_TITLE,JOB_LOCATION
          script: |
            echo "$GHCR_PAT" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            mkdir -p /opt/jobscrapper/data
            docker pull ${{ env.IMAGE }}:latest
            docker rm -f jobscrapper-bot || true
            docker run -d \
              --name jobscrapper-bot \
              --restart unless-stopped \
              -v /opt/jobscrapper/data:/app/data \
              -e SEEN_JOBS_FILE=/app/data/seen_jobs.json \
              -e SUBSCRIBERS_FILE=/app/data/subscribers.json \
              -e DISCORD_TOKEN="$DISCORD_TOKEN" \
              -e DISCORD_CHANNEL_ID="$DISCORD_CHANNEL_ID" \
              -e JOB_TITLE="$JOB_TITLE" \
              -e JOB_LOCATION="$JOB_LOCATION" \
              ${{ env.IMAGE }}:latest
            docker logout ghcr.io
            docker image prune -af --filter "until=168h"
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          GHCR_USER: ${{ github.repository_owner }}
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          JOB_TITLE: ${{ secrets.JOB_TITLE }}
          JOB_LOCATION: ${{ secrets.JOB_LOCATION }}
